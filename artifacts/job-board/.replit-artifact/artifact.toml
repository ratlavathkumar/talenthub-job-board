kind = "web"
previewPath = "/"
title = "Job Board"
version = "1.0.0"
id = "artifacts/job-board"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 18735

[services.development]
run = "pnpm --filter @workspace/job-board run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/job-board", "run", "build" ]
publicDir = "artifacts/job-board/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "18735"
BASE_PATH = "/"
